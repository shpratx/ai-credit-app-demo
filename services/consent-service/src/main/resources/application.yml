spring:
  application:
    name: consent-service
  datasource:
    url: jdbc:postgresql://localhost:5432/consent_db
    username: ${DB_USERNAME:consent_user}
    password: ${DB_PASSWORD:consent_pass}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: public
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

app:
  pubsub:
    topic:
      consent-granted: credit-coach.consent.granted
      consent-revoked: credit-coach.consent.revoked
