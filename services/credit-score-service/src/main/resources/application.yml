spring:
  application:
    name: credit-score-service
  datasource:
    url: jdbc:postgresql://localhost:5432/scores_db
    username: ${DB_USERNAME:scores_user}
    password: ${DB_PASSWORD:scores_pass}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

resilience4j:
  circuitbreaker:
    instances:
      experian:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 60s
        permitted-number-of-calls-in-half-open-state: 3
        minimum-number-of-calls: 3
  retry:
    instances:
      experian:
        max-attempts: 3
        wait-duration: 500ms
  timelimiter:
    instances:
      experian:
        timeout-duration: 2500ms

app:
  pubsub:
    topic:
      score-retrieved: credit-coach.score.retrieved
      score-changed: credit-coach.score.changed
